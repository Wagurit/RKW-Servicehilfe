<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RKW Dosier- & Wartungshilfe</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0ea5e9;
    --surface: #0284c7;
    --surface2: #0369a1;
    --border: #38bdf8;
    --accent: #1e293b;
    --accent2: #0f172a;
    --ok: #15803d;
    --warn: #b45309;
    --err: #b91c1c;
    --text: #0f172a;
    --muted: #1e3a5f;
    --input-bg: #e0f2fe;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    font-size: 14px;
  }

  /* HEADER */
  .header {
    background: #0369a1;
    border-bottom: 1px solid #0284c7;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    height: 56px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: 1px;
    color: #ffffff;
    white-space: nowrap;
  }
  .logo span { color: #bae6fd; font-weight: 400; }
  .header-right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  .btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.4);
    color: #ffffff;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all .15s;
  }
  .btn:hover { background: rgba(255,255,255,0.25); border-color: #ffffff; }
  .btn-primary {
    background: #ffffff;
    border-color: #ffffff;
    color: #0369a1;
    font-weight: 700;
  }
  .btn-primary:hover { background: #e0f2fe; }

  /* TABS */
  .tabs {
    background: #0284c7;
    border-bottom: 1px solid #0369a1;
    padding: 0 24px;
    display: flex;
    gap: 4px;
    overflow-x: auto;
  }
  .tab {
    padding: 10px 18px;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: .5px;
    color: #bae6fd;
    border-bottom: 2px solid transparent;
    transition: all .15s;
    white-space: nowrap;
  }
  .tab:hover { color: #ffffff; }
  .tab.active { color: #ffffff; border-bottom-color: #ffffff; }
  .tab .status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    margin-left: 6px;
    vertical-align: middle;
  }
  .tab .status-dot.ok { background: var(--ok); }
  .tab .status-dot.warn { background: var(--warn); }
  .tab .status-dot.err { background: var(--err); }

  /* MAIN */
  .main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }
  .rkw-panel { display: none; }
  .rkw-panel.active { display: block; }

  /* GRID LAYOUT */
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 16px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 16px; }
  .grid-full { margin-bottom: 16px; }
  @media(max-width: 900px) {
    .grid-3, .grid-2 { grid-template-columns: 1fr; }
  }

  /* CARDS */
  .card {
    background: #ffffff;
    border: 1px solid #bae6fd;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.10);
  }
  .card-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #0369a1;
    padding: 10px 14px;
    background: #e0f2fe;
    border-bottom: 1px solid #bae6fd;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .icon { font-size: 14px; }
  .card-body { padding: 14px; }

  /* FIELDS */
  .field { margin-bottom: 10px; }
  .field:last-child { margin-bottom: 0; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .5px;
    color: var(--muted);
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .field input {
    width: 100%;
    font-size: 16px;
    background: #f0f9ff;
    border: 1px solid #7dd3fc;
    border-radius: 6px;
    color: #0f172a;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 7px 10px;
    transition: border-color .15s;
    outline: none;
  }
  .field input:focus { border-color: #0369a1; box-shadow: 0 0 0 2px #bae6fd; }
  .field input[type="date"] { color-scheme: dark; }

  /* RESULTS */
  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid #e0f2fe;
  }
  .result-row:last-child { border-bottom: none; }
  .result-label { color: #1e3a5f; font-size: 12px; flex: 1; }
  .result-value {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: #0f172a;
    text-align: right;
  }
  .result-unit { color: #64748b; font-size: 11px; margin-left: 4px; }

  /* WARNINGS */
  .warnings-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  @media(max-width: 700px) { .warnings-grid { grid-template-columns: 1fr; } }

  .warn-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid;
    font-size: 12px;
    font-weight: 600;
  }
  .warn-badge .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .warn-badge.status-ok { background: #f0fdf4; border-color: #86efac; color: #15803d; }
  .warn-badge.status-ok .dot { background: #22c55e; }
  .warn-badge.status-warn { background: #fffbeb; border-color: #fcd34d; color: #b45309; }
  .warn-badge.status-warn .dot { background: #f59e0b; }
  .warn-badge.status-err { background: #fef2f2; border-color: #fca5a5; color: #b91c1c; }
  .warn-badge.status-err .dot { background: #ef4444; }

  /* EINDICKUNG VISUAL */
  .eindickung-bar {
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: visible;
    position: relative;
    margin: 6px 0 2px;
  }
  .eindickung-range {
    position: absolute;
    height: 100%;
    background: rgba(14,165,233,.25);
    border-radius: 4px;
    left: 33.3%; width: 33.3%; /* Sollbereich 2-4 auf Skala 0-6 */
  }
  .eindickung-marker {
    position: absolute;
    top: -3px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    transform: translateX(-50%);
    transition: left .3s;
  }

  /* VERLAUF */
  .history-entry {
    background: #ffffff;
    border: 1px solid #bae6fd;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color .15s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .history-entry:hover { border-color: #0369a1; }
  .history-entry-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .history-date { font-family: 'DM Mono', monospace; font-size: 12px; color: #0369a1; }
  .history-stats { display: flex; gap: 12px; font-size: 11px; color: #1e3a5f; }
  .history-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .mini-badge {
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .5px;
  }
  .mini-ok { background: #f0fdf4; color: #15803d; border: 1px solid #86efac; }
  .mini-warn { background: #fffbeb; color: #b45309; border: 1px solid #fcd34d; }
  .mini-err { background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; }

  /* SECTION DIVIDER */
  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #0f172a;
    margin: 20px 0 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #7dd3fc;
  }

  /* PRINT */
  @media print {
    .header, .tabs, .header-right, .btn { display: none !important; }
    body { background: white; color: black; }
    .card { border: 1px solid #ccc; break-inside: avoid; }
    .warn-badge.status-ok { background: #f0fff4; }
    .warn-badge.status-warn { background: #fffbf0; }
    .warn-badge.status-err { background: #fff0f0; }
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #ffffff;
    border: 1px solid #bae6fd;
    border-radius: 12px;
    padding: 24px;
    width: 90%;
    max-width: 500px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .modal h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    margin-bottom: 16px;
    color: #0369a1;
  }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .modal .btn { background: #e0f2fe; border-color: #7dd3fc; color: #0369a1; }
  .modal .btn:hover { background: #bae6fd; }

  .highlight-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: #0369a1;
  }
  .big-result {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .eindickung-bar {
    height: 8px;
    background: #e0f2fe;
    border-radius: 4px;
    overflow: visible;
    position: relative;
    margin: 6px 0 2px;
  }
  .eindickung-range {
    position: absolute;
    height: 100%;
    background: rgba(14,165,233,.3);
    border-radius: 4px;
    left: 33.3%; width: 33.3%; /* Sollbereich 2-4 auf Skala 0-6 */
  }
  .eindickung-marker {
    position: absolute;
    top: -3px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #0369a1;
    transform: translateX(-50%);
    transition: left .3s;
  }
</style>
</head>

  <div class="logo">RKW <span>Dosier- & Wartungshilfe</span></div>

    <button class="btn" onclick="showHistory()">📋 Verlauf</button>
    <button class="btn" onclick="exportExcel()">📊 Excel Export</button>

  </div>
</div>

<div class="tabs" id="tabs"></div>

<div class="main" id="main"></div>

<!-- Verlauf Modal -->
<div class="modal-overlay" id="historyModal">
  <div class="modal">
    <h3>📋 Gespeicherte Einträge</h3>
    <div id="historyList"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeHistory()">Schließen</button>
    </div>
  </div>
</div>

<script>
// ── STATE ─────────────────────────────────────────────────────────────────
const RKW_COUNT = 5;
let activeRKW = 0;

// Default-Werte aus Excel
const defaults = {
  datum_alt: '',
  datum_neu: todayStr(),
  ueb_pos: '',
  ueb_neg: '',
  kontakt: '',
  dos_ml_hub: '',
  zaehler_alt: '',
  zaehler_neu: '',
  prod_eintrag: '',
  ks_zw: '',
  lf_zw: '',
  dh_zw: '',
  cl_zw: '',
  lf_uw: '',
  soll_lf: '',
  dh_uw: '',
  cl_uw: '',
  datum_btb: '',
  sys_vol: '',
  dos_min_ml: '',
  dos_dauer: '',
  dos_freq: '',
  dos_soll_ml: '',
};

// State pro RKW

// Heutiges Datum im Format TT.MM.JJJJ
function todayStr() {
  const d = new Date();
  return String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + d.getFullYear();
}

const state = Array.from({length: RKW_COUNT}, () => ({...defaults}));

// ── BERECHNUNGEN ──────────────────────────────────────────────────────────

// Datum parsen - versteht viele Formate
function parseDate(str) {
  if (!str) return NaN;
  str = str.trim();
  if (str.includes('.')) {
    // TT.MM.JJJJ oder T.M.JJ oder T.M.JJJJ etc.
    const parts = str.split('.');
    if (parts.length < 3) return NaN;
    let [d, m, y] = parts;
    d = +d; m = +m;
    y = +y;
    if (y < 100) y += 2000; // 26 → 2026
    if (!d || !m || !y) return NaN;
    return new Date(y, m - 1, d);
  }
  if (str.includes('-')) {
    // YYYY-MM-DD
    return new Date(str);
  }
  return NaN;
}

// Datum formatieren für Anzeige
function fmtDate(date) {
  if (!date || isNaN(date)) return '';
  return String(date.getDate()).padStart(2,'0') + '.' +
         String(date.getMonth()+1).padStart(2,'0') + '.' +
         date.getFullYear();
}

function calc(s) {
  const r = {};

  // Dosierpumpe
  r.prod_korr_pos = s.ueb_pos * s.dos_ml_hub;
  r.prod_korr_neg = s.dos_ml_hub / s.ueb_neg;

  // Wasserbilanz
  const zaehler_neu = parseFloat(s.zaehler_neu) || 0;
  const zaehler_alt = parseFloat(s.zaehler_alt) || 0;
  const wasserverbrauch_diff = zaehler_neu - zaehler_alt;
  const prod_eintrag = parseFloat(s.prod_eintrag) || 0;

  // Eindickungen
  r.ez_lf  = s.lf_uw  / s.lf_zw;
  r.ez_dh  = s.dh_uw  / s.dh_zw;
  r.ez_cl  = s.cl_uw  / s.cl_zw;
  r.ez_soll = s.soll_lf / s.lf_zw;

  r.ez_ist = r.ez_lf; // Eindickung IST nach LF

  // Prozent SOLL LF
  r.pct_soll_lf = s.lf_uw / s.soll_lf;

  // Produkt ml/m3 Nachspeisung (rechnerisch)
  r.prod_ml_m3_ns = (10 / s.kontakt) * ((r.prod_korr_pos + r.prod_korr_neg) - s.dos_ml_hub);

  // Zusatzwasser
  if (zaehler_neu < 1) {
    r.zusatzwasser = wasserverbrauch_diff;
  } else {
    r.zusatzwasser = zaehler_neu > zaehler_alt ? zaehler_neu - zaehler_alt : 0;
  }

  // Abwasser, Verdunstung
  r.abwasser   = r.ez_ist > 0 ? r.zusatzwasser / r.ez_ist : 0;
  r.verdunstung = r.zusatzwasser - r.abwasser;

  // Produktverbrauch rechnerisch
  r.prod_verbrauch_l = (r.prod_ml_m3_ns / 1000) * r.zusatzwasser;

  // Produkt ml/m3 Umlauf
  r.prod_ml_m3_ul    = r.ez_ist * r.prod_ml_m3_ns;
  r.prod_ml_m3_ul_soll = r.prod_ml_m3_ul / r.pct_soll_lf;

  // Produktverbrauch nach Eintragung
  r.prod_ns_eintrag = prod_eintrag > 0 && r.zusatzwasser > 0
    ? (prod_eintrag / r.zusatzwasser) * 1000 : 0;
  r.prod_ul_eintrag_soll = r.prod_ns_eintrag > 0
    ? (r.prod_ns_eintrag * r.ez_ist) / r.pct_soll_lf : 0;

  // Produkt bei IST Eindickung
  r.prod_bei_ez_lf = r.prod_ml_m3_ns * r.ez_lf;
  r.prod_bei_ez_dh = r.prod_ml_m3_ns * r.ez_dh;
  r.prod_bei_ez_cl = r.prod_ml_m3_ns * r.ez_cl;

  // Karbonathärte
  r.kh_zw_scheinbar = s.ks_zw * 2.8;
  const dh_uw_val = parseFloat(s.dh_uw) || 0;
  r.kh_uw_real = (dh_uw_val > r.kh_zw_scheinbar ? r.kh_zw_scheinbar : dh_uw_val) * r.ez_ist;
  r.kh_bei_soll_lf = r.ez_ist > 0 ? r.kh_uw_real * (1 / r.pct_soll_lf) : 0;

  // Chlorid bei SOLL LF
  r.cl_bei_soll_lf = s.cl_zw * r.ez_soll;

  // Biozid
  r.bio_dos_pro_dos_l  = (s.dos_min_ml * s.dos_dauer) / 1000;
  r.bio_dos_pro_woche  = r.bio_dos_pro_dos_l * s.dos_freq;
  // Soll-Dauer
  r.bio_dos_dauer_soll = (s.sys_vol * s.dos_soll_ml) / s.dos_min_ml;
  r.bio_dos_soll_pro_dos_l  = (s.dos_min_ml * r.bio_dos_dauer_soll) / 1000;
  r.bio_dos_soll_pro_woche  = r.bio_dos_soll_pro_dos_l * s.dos_freq;

  // Seit letztem BTB
  const d1 = parseDate(s.datum_btb);
  const d2 = parseDate(s.datum_neu);
  r.tage_seit_btb = isNaN(d1) || isNaN(d2) ? 0 : Math.max(0, Math.round((d2-d1)/86400000));
  r.bio_seit_btb_ist  = (r.tage_seit_btb / 7) * r.bio_dos_pro_woche;
  r.bio_seit_btb_soll = (r.tage_seit_btb / 7) * r.bio_dos_soll_pro_woche;

  // ml/m3 Systemvolumen
  r.bio_ml_m3 = s.sys_vol > 0 ? (r.bio_dos_pro_dos_l * 1000) / s.sys_vol : 0;

  // ── WARNUNGEN ──
  r.warnings = [];

  // Chlorid
  const cl_uw = parseFloat(s.cl_uw) || 0;
  if (cl_uw > 250) r.warnings.push({id:'cl250', text:'Cl Legierter Stahl > 250 mg/l', sev:'err'});
  if (cl_uw > 200) r.warnings.push({id:'cl200', text:'Cl Edelstahl > 200 mg/l', sev:'err'});
  if (cl_uw > 150) r.warnings.push({id:'cl150', text:'Cl Schwarzstahl > 150 mg/l', sev:'warn'});
  if (cl_uw > 0 && cl_uw <= 150) r.warnings.push({id:'cl_ok', text:'Chlorid i.O.', sev:'ok'});

  // Dosierung ausreichend?
  // Prüfung nur wenn Produktwert berechnet wurde (prod_ml_m3_ns > 0)
  if (r.prod_ml_m3_ns > 0) {
    // Nach LF - nur wenn LF-Werte vorhanden
    if (s.lf_zw && s.lf_uw) {
      if (r.prod_bei_ez_lf < 160) r.warnings.push({id:'dos_lf', text:'Dos. zu niedrig (nach LF) < 160 ml/m³ – anheben!', sev:'err'});
      else r.warnings.push({id:'dos_lf_ok', text:'Dosierung nach LF i.O.', sev:'ok'});
    } else {
      // Keine LF-Werte: direkt prod_ml_m3_ns prüfen
      if (r.prod_ml_m3_ns < 160) r.warnings.push({id:'dos_lf', text:'Dos. zu niedrig (nach Einstellung) < 160 ml/m³ – anheben!', sev:'err'});
      else r.warnings.push({id:'dos_lf_ok', text:'Dosierung nach Einstellung i.O.', sev:'ok'});
    }

    // Nach dH - nur wenn dH-Werte vorhanden
    if (s.dh_zw && s.dh_uw) {
      if (r.prod_bei_ez_dh < 160) r.warnings.push({id:'dos_dh', text:'Dos. zu niedrig (nach °dH) < 160 ml/m³', sev:'warn'});
      else r.warnings.push({id:'dos_dh_ok', text:'Dosierung nach °dH i.O.', sev:'ok'});
    }

    // Nach Cl - nur wenn Cl-Werte vorhanden
    if (s.cl_zw && s.cl_uw) {
      if (r.prod_bei_ez_cl < 160) r.warnings.push({id:'dos_cl', text:'Dos. zu niedrig (nach Cl) < 160 ml/m³', sev:'warn'});
      else r.warnings.push({id:'dos_cl_ok', text:'Dosierung nach Cl i.O.', sev:'ok'});
    }
  } // Ende prod_ml_m3_ns > 0

  // Eindickung Plausibilität
  // Plausibilitätsprüfung: alle 3 EZ-Werte dürfen max. 0,3 voneinander abweichen
  const ez_vals = [r.ez_lf, r.ez_dh, r.ez_cl].filter(v => v > 0);
  const ez_max = Math.max(...ez_vals);
  const ez_min = Math.min(...ez_vals);
  const ez_spread = ez_max - ez_min;

  // Härteausfällung: Cl > dH (unabhängig von Plausibilität)
  if (r.ez_cl > r.ez_dh + 0.1) r.warnings.push({id:'ausfaell', text:'Ggf. Ausfällung – Härte fehlt (Cl/°dH)', sev:'err'});

  if (s.lf_zw && s.lf_uw && s.dh_zw && s.dh_uw && s.cl_zw && s.cl_uw) {
    if (ez_spread > 0.3) {
      r.warnings.push({id:'ez_abw', text:'Abweichende Eindickung LF/Cl/°dH', sev:'warn'});
    } else {
      r.warnings.push({id:'ez_plaus', text:'EZ Eindickung plausibel', sev:'ok'});
    }
  }

  // Karbonathärte
  if (s.ks_zw) {
    if (r.kh_bei_soll_lf > 18.1) r.warnings.push({id:'kh_ein', text:'Ggf. Eindickung reduzieren (KH > 18)', sev:'warn'});
    else r.warnings.push({id:'kh_ok', text:'Karbonathärte i.O.', sev:'ok'});
  }

  const dh_uw_num = parseFloat(s.dh_uw) || 0;
  if (r.kh_uw_real > dh_uw_num * 1.07) r.warnings.push({id:'kh_dh', text:'°KH UW > °dH UW', sev:'warn'});

  // Eindickung Bereich
  if (r.ez_ist < 2) r.warnings.push({id:'ez_low', text:'Eindickung IST < 2 (zu niedrig)', sev:'warn'});
  else if (r.ez_ist > 4) r.warnings.push({id:'ez_high', text:'Eindickung IST > 4 (zu hoch)', sev:'warn'});
  else if (s.lf_zw && s.lf_uw) r.warnings.push({id:'ez_range', text:'Eindickung im Sollbereich 2–4', sev:'ok'});

  // Produkt ml/m³ Umlauf Bereich
  // Rechnerisch (über Pumpe) oder nach Eintragung (über Zählerstand)
  const prod_ul_check = r.prod_ml_m3_ns > 0 ? r.prod_ml_m3_ul_soll
                      : r.prod_ul_eintrag_soll > 0 ? r.prod_ul_eintrag_soll
                      : null;
  if (prod_ul_check !== null) {
    if (prod_ul_check < 160) r.warnings.push({id:'prod_low', text:'Produkt < 160 ml/m³ Umlauf – zu wenig', sev:'err'});
    else if (prod_ul_check > 250) r.warnings.push({id:'prod_high', text:'Produkt > 250 ml/m³ Umlauf – zu viel', sev:'warn'});
    else r.warnings.push({id:'prod_ok', text:'Produktkonzentration 160–250 ml/m³ i.O.', sev:'ok'});
  }

  return r;
}

function fmt(v, dec=1) {
  if (v === undefined || v === null || isNaN(v)) return '–';
  return Number(v).toFixed(dec).replace('.', ',');
}
function fmtDate(d) { if(!d) return '–'; return d.replace(/-/g,'.').split('.').reverse().join('.'); }

// ── RENDER ────────────────────────────────────────────────────────────────
function buildPanel(idx) {
  const s = state[idx];
  const r = calc(s);

  const sevCount = {ok:0, warn:0, err:0};
  r.warnings.forEach(w => sevCount[w.sev]++);

  return `
  <div class="section-label">📅 Besuchsdaten</div>
  <div class="grid-3">
    <div class="card">
      <div class="card-title"><span class="icon">📅</span> Datum</div>
      <div class="card-body">
        <div class="field">
          <label>Datum letzter Besuch</label>
          <input id="i_${idx}_datum_alt" type="text" enterkeyhint="next" autocomplete="off" placeholder="TT.MM.JJJJ" value="${s.datum_alt}" onchange="upd(${idx},'datum_alt',this.value)">
        </div>
        <div class="field">
          <label>Datum aktueller Besuch</label>
          <input id="i_${idx}_datum_neu" type="text" enterkeyhint="next" autocomplete="off" placeholder="TT.MM.JJJJ" value="${s.datum_neu}" onchange="upd(${idx},'datum_neu',this.value)">
        </div>
      </div>
    </div>  <div class="section-label">💧 Wasserwerte</div>
  <div class="grid-2">
    <div class="card">
      <div class="card-title"><span class="icon">🚰</span> Speisewasser / Zusatzwasser</div>
      <div class="card-body">
        <div class="field"><label>KS 4,3</label><input id="i_${idx}_ks_zw" type="number" inputmode="numeric" enterkeyhint="next" step="0.1" value="${s.ks_zw}" oninput="upd(${idx},\'ks_zw\',+this.value)"></div>
        <div class="field"><label>LF Zusatzwasser (µS/cm)</label><input id="i_${idx}_lf_zw" type="number" inputmode="numeric" enterkeyhint="next" value="${s.lf_zw}" oninput="upd(${idx},\'lf_zw\',+this.value)"></div>
        <div class="field"><label>°dH Zusatzwasser</label><input id="i_${idx}_dh_zw" type="number" inputmode="numeric" enterkeyhint="next" step="0.1" value="${s.dh_zw}" oninput="upd(${idx},\'dh_zw\',+this.value)"></div>
        <div class="field"><label>Cl mg/l Zusatzwasser</label><input id="i_${idx}_cl_zw" type="number" inputmode="numeric" enterkeyhint="next" value="${s.cl_zw}" oninput="upd(${idx},\'cl_zw\',+this.value)"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><span class="icon">🔄</span> Umlaufwasser (IST-Werte)</div>
      <div class="card-body">
        <div class="field"><label>IST LF Umlaufwasser (µS/cm)</label><input id="i_${idx}_lf_uw" type="number" inputmode="numeric" enterkeyhint="next" value="${s.lf_uw}" oninput="upd(${idx},\'lf_uw\',+this.value)"></div>
        <div class="field"><label>Soll-LF (µS/cm)</label><input id="i_${idx}_soll_lf" type="number" inputmode="numeric" enterkeyhint="next" value="${s.soll_lf}" oninput="upd(${idx},\'soll_lf\',+this.value)"></div>
        <div class="field"><label>°dH Umlaufwasser</label><input id="i_${idx}_dh_uw" type="number" inputmode="numeric" enterkeyhint="next" step="0.1" value="${s.dh_uw}" oninput="upd(${idx},\'dh_uw\',+this.value)"></div>
        <div class="field"><label>Cl mg/l Umlaufwasser</label><input id="i_${idx}_cl_uw" type="number" inputmode="numeric" enterkeyhint="next" value="${s.cl_uw}" oninput="upd(${idx},\'cl_uw\',+this.value)"></div>
      </div>
    </div>
  </div>

  <div class="section-label">⚠️ Warnungen & Status</div>
  <div class="card grid-full">
    <div class="card-title">
      <span class="icon">⚠️</span> Statusübersicht
      <span style="margin-left:auto;display:flex;gap:8px;font-size:11px;">
        <span id="sc_ok_${idx}" style="color:var(--ok)">✓ ${sevCount.ok} i.O.</span>
        <span id="sc_warn_${idx}" style="color:var(--warn)">⚠ ${sevCount.warn} Warnung</span>
        <span id="sc_err_${idx}" style="color:var(--err)">✗ ${sevCount.err} Problem</span>
      </span>
    </div>
    <div class="card-body">
      <div class="warnings-grid" id="w_${idx}">
        ${r.warnings.map(w => `
          <div class="warn-badge status-${w.sev}">
            <div class="dot"></div>
            ${w.text}
          </div>
        `).join('')}
      </div>
    </div>
  </div>
    <div class="section-label">🧮 Berechnungsergebnisse</div>
  <div class="grid-3">
    <div class="card">
      <div class="card-title"><span class="icon">📊</span> Eindickung</div>
      <div class="card-body">
        <div class="result-row">
          <span class="result-label">Eindickung IST (nach LF)</span>
          <span class="result-value" id="r_${idx}_ez_ist_0" style="color:${r.ez_ist>=2&&r.ez_ist<=4?'var(--ok)':r.ez_ist<1.5||r.ez_ist>5?'var(--err)':'var(--warn)'}">
            ${fmt(r.ez_lf,2)}<span class="result-unit">fach</span>
          </span>
        </div>
        <div class="result-row">
          <span class="result-label">Eindickung nach °dH</span>
          <span class="result-value" id="r_${idx}_ez_dh_1" style="color:${r.ez_dh>r.ez_soll?'var(--err)':'inherit'}">${fmt(r.ez_dh,2)}<span class="result-unit">fach</span></span>
        </div>
        <div class="result-row">
          <span class="result-label">Eindickung nach Cl</span>
          <span class="result-value" id="r_${idx}_ez_cl_2" style="color:${r.ez_cl>r.ez_soll?'var(--err)':'inherit'}">${fmt(r.ez_cl,2)}<span class="result-unit">fach</span></span>
        </div>
        <div class="result-row">
          <span class="result-label">Eindickung SOLL</span>
          <span class="result-value" id="r_${idx}_ez_soll_3">${fmt(r.ez_soll,2)}<span class="result-unit">fach</span></span>
        </div>
        <div class="result-row">
          <span class="result-label">% der SOLL-LF</span>
          <span class="result-value" id="r_${idx}_pct_soll_lf_4" style="color:${r.pct_soll_lf*100>105?'var(--err)':'inherit'}">${fmt(r.pct_soll_lf*100,1)}<span class="result-unit">%</span></span>
        </div>
        <div style="margin-top:8px;">
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">Sollbereich 2–4</div>
          <div class="eindickung-bar">
            <div class="eindickung-range"></div>
            <div class="eindickung-marker" style="left:${Math.min(95,Math.max(5,(r.ez_ist/6)*100))}%"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);">
            <span>0</span><span>2</span><span>4</span><span>6+</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon">⚙️</span> Dosierpumpe</div>
      <div class="card-body">
        <div class="field"><label>Übersetzung Positiv</label><input id="i_${idx}_ueb_pos" type="number" inputmode="numeric" enterkeyhint="next" value="${s.ueb_pos}" oninput="upd(${idx},\'ueb_pos\',+this.value)"></div>
        <div class="field"><label>Übersetzung Negativ</label><input id="i_${idx}_ueb_neg" type="number" inputmode="numeric" enterkeyhint="next" value="${s.ueb_neg}" oninput="upd(${idx},\'ueb_neg\',+this.value)"></div>
        <div class="field"><label>Kontakt</label><input id="i_${idx}_kontakt" type="number" inputmode="numeric" enterkeyhint="next" step="0.1" value="${s.kontakt}" oninput="upd(${idx},\'kontakt\',+this.value)"></div>
        <div class="field"><label>Dos. ml / 100 Hub</label><input id="i_${idx}_dos_ml_hub" type="number" inputmode="numeric" enterkeyhint="next" value="${s.dos_ml_hub}" oninput="upd(${idx},\'dos_ml_hub\',+this.value)"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><span class="icon">🔢</span> Zählerstand & Verbrauch</div>
      <div class="card-body">
        <div class="field"><label>Zählerstand alt</label><input id="i_${idx}_zaehler_alt" type="number" inputmode="numeric" enterkeyhint="next" value="${s.zaehler_alt}" oninput="upd(${idx},\'zaehler_alt\',+this.value)"></div>
        <div class="field"><label>Zählerstand neu</label><input id="i_${idx}_zaehler_neu" type="number" inputmode="numeric" enterkeyhint="next" value="${s.zaehler_neu}" oninput="upd(${idx},\'zaehler_neu\',+this.value)" placeholder="0 = aus Wasserverbrauch"></div>
        <div class="field"><label>Produktverbrauch Eintragung (L)</label><input id="i_${idx}_prod_eintrag" type="number" inputmode="numeric" enterkeyhint="next" step="0.1" value="${s.prod_eintrag}" oninput="upd(${idx},\'prod_eintrag\',+this.value)"></div>
      </div>
    </div>
  </div>


    <div class="card">
      <div class="card-title"><span class="icon">🧪</span> Produktverbrauch</div>
      <div class="card-body">
        <div style="margin-bottom:12px;">
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">Rechnerisch (aus Pumpe)</div>
          <div class="big-result">
            <span class="highlight-value">${fmt(r.prod_ml_m3_ul_soll,0)}</span>
            <span style="color:var(--muted);font-size:12px;">ml/m³ Umlauf bei SOLL LF</span>
          </div>
          <div style="font-size:11px;color:${r.prod_ml_m3_ul_soll>=160&&r.prod_ml_m3_ul_soll<=250?'var(--ok)':r.prod_ml_m3_ul_soll<160?'var(--err)':'var(--warn)'}">
            Sollbereich: 160–250 ml/m³
          </div>
        </div>
        <div class="result-row">

function render() {
  // Tabs
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = Array.from({length: RKW_COUNT}, (_,i) => {
    const s = state[i];
    const r = calc(s);
    const maxSev = r.warnings.some(w=>w.sev==='err') ? 'err'
                 : r.warnings.some(w=>w.sev==='warn') ? 'warn' : 'ok';
    return `<div class="tab ${i===activeRKW?'active':''}" onclick="switchRKW(${i})">
      RKW ${i+1}
      <span class="status-dot ${maxSev}"></span>
    </div>`;
  }).join('') + `<div class="tab ${activeRKW===5?'active':''}" onclick="switchRKW(5)">📋 Verlauf</div>`;

  // Panel
  const mainEl = document.getElementById('main');
  if (activeRKW < 5) {
    mainEl.innerHTML = `<div class="rkw-panel active">${buildPanel(activeRKW)}</div>`;
    // Ergebnisse sofort nach DOM-Aufbau aktualisieren
    updateResults(activeRKW);
  } else {
    renderHistoryPanel(mainEl);
  }
}

function switchRKW(i) {
  activeRKW = i;
  render();
}

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  if (!tabsEl) return;
  tabsEl.innerHTML = Array.from({length: RKW_COUNT}, (_,i) => {
    const s = state[i];
    const r = calc(s);
    const maxSev = r.warnings.some(w=>w.sev==='err') ? 'err'
                 : r.warnings.some(w=>w.sev==='warn') ? 'warn' : 'ok';
    return `<div class="tab ${i===activeRKW?'active':''}" onclick="switchRKW(${i})">
      RKW ${i+1}
      <span class="status-dot ${maxSev}"></span>
    </div>`;
  }).join('') + `<div class="tab ${activeRKW===5?'active':''}" onclick="switchRKW(5)">📋 Verlauf</div>`;
}


function upd(idx, key, val) {
  state[idx][key] = val;
  // datum_btb immer mit datum_alt synchronisieren
  if (key === 'datum_alt') {
    const btb = state[idx].datum_btb;
    const prevAlt = state[idx]._prev_datum_alt || '';
    if (!btb || btb === prevAlt) {
      state[idx].datum_btb = val;
      // BTB Input-Feld direkt aktualisieren ohne render()
      const btbEl = document.getElementById(`i_${idx}_datum_btb`);
      if (btbEl) btbEl.value = val;
    }
    state[idx]._prev_datum_alt = val;
  }
  updateResults(idx);
}

// ── VERLAUF ───────────────────────────────────────────────────────────────
function getHistory() {
  try { return JSON.parse(localStorage.getItem('rkw_history') || '[]'); } catch { return []; }
}
function saveHistory(h) {
  localStorage.setItem('rkw_history', JSON.stringify(h));
}

function saveEntry() {
  const s = state[activeRKW < 5 ? activeRKW : 0];
  const r = calc(s);
  const entry = {
    ts: Date.now(),
    rkw: activeRKW < 5 ? activeRKW + 1 : 1,
    datum: s.datum_neu,
    state: {...s},
    summary: {
      ez_lf: r.ez_lf, ez_dh: r.ez_dh, ez_cl: r.ez_cl,
      prod_ul: r.prod_ml_m3_ul_soll,
      cl_uw: s.cl_uw,
      warns: r.warnings.filter(w=>w.sev!=='ok').length,
      errs: r.warnings.filter(w=>w.sev==='err').length,
    }
  };
  const h = getHistory();
  h.unshift(entry);
  if (h.length > 50) h.pop();
  saveHistory(h);
  alert(`✅ RKW ${entry.rkw} – Eintrag für ${fmtDate(s.datum_neu)} gespeichert!`);
}

function renderHistoryPanel(mainEl) {
  const h = getHistory();
  mainEl.innerHTML = `
    <div class="section-label">📋 Gespeicherte Einträge</div>
    ${h.length === 0 ? '<div style="color:var(--muted);padding:20px;">Noch keine Einträge gespeichert.</div>' :
      h.map((e,i) => `
        <div class="history-entry" onclick="loadEntry(${i})">
          <div class="history-entry-header">
            <span class="history-date">RKW ${e.rkw} – ${fmtDate(e.datum)}</span>
            <span style="font-size:11px;color:var(--muted);">${new Date(e.ts).toLocaleString('de-DE')}</span>
          </div>
          <div class="history-stats">
            <span>EZ LF: <b>${fmt(e.summary.ez_lf,2)}</b></span>
            <span>EZ °dH: <b>${fmt(e.summary.ez_dh,2)}</b></span>
            <span>EZ Cl: <b>${fmt(e.summary.ez_cl,2)}</b></span>
            <span>Prod: <b>${fmt(e.summary.prod_ul,0)} ml/m³</b></span>
            <span>Cl UW: <b>${e.summary.cl_uw} mg/l</b></span>
          </div>
          <div class="history-badges">
            ${e.summary.errs > 0 ? `<span class="mini-badge mini-err">⚠ ${e.summary.errs} Problem(e)</span>` : ''}
            ${e.summary.warns > 0 ? `<span class="mini-badge mini-warn">△ ${e.summary.warns} Warnung(en)</span>` : ''}
            ${e.summary.errs === 0 && e.summary.warns === 0 ? '<span class="mini-badge mini-ok">✓ Alles i.O.</span>' : ''}
          </div>
        </div>
      `).join('')
    }
    <div style="margin-top:16px;">
      <button class="btn" onclick="clearHistory()">🗑 Verlauf löschen</button>
    </div>
  `;
}

function loadEntry(i) {
  const h = getHistory();
  const e = h[i];
  const rkwIdx = (e.rkw || 1) - 1;
  Object.assign(state[rkwIdx], e.state);
  activeRKW = rkwIdx;
  render();
}

function clearHistory() {
  if (confirm('Gesamten Verlauf wirklich löschen?')) {
    saveHistory([]);
    render();
  }
}

function showHistory() {
  activeRKW = 5;
  render();
}
function closeHistory() {
  activeRKW = 0;
  render();
}

function exportExcel() {
  const idx = activeRKW < 5 ? activeRKW : 0;
  const s = state[idx];
  const r = calc(s);
  const rkwNr = idx + 1;

  // CSV mit Semikolon (Excel-kompatibel für Deutschland)
  const rows = [
    [`RKW ${rkwNr} – Dosier- & Wartungshilfe`],
    [],
    ['BESUCHSDATEN'],
    ['Datum letzter Besuch', s.datum_alt],
    ['Datum aktueller Besuch', s.datum_neu],
    [],
    ['DOSIERPUMPE'],
    ['Übersetzung Positiv', s.ueb_pos],
    ['Übersetzung Negativ', s.ueb_neg],
    ['Kontakt', s.kontakt],
    ['Dos. ml / 100 Hub', s.dos_ml_hub],
    ['Produkt korrigiert Positiv (ml/Hub)', fmt(r.prod_korr_pos,1)],
    ['Produkt korrigiert Negativ (ml/Hub)', fmt(r.prod_korr_neg,1)],
    [],
    ['ZÄHLERSTAND & VERBRAUCH'],
    ['Zählerstand alt', s.zaehler_alt],
    ['Zählerstand neu', s.zaehler_neu],
    ['Zusatzwasser (m³)', fmt(r.zusatzwasser,2)],
    ['Abwasser (m³)', fmt(r.abwasser,2)],
    ['Verdunstung (m³)', fmt(r.verdunstung,2)],
    ['Produktverbrauch Eintragung (L)', s.prod_eintrag],
    [],
    ['WASSERWERTE – SPEISEWASSER'],
    ['KS 4,3', s.ks_zw],
    ['LF Zusatzwasser (µS/cm)', s.lf_zw],
    ['°dH Zusatzwasser', s.dh_zw],
    ['Cl mg/l Zusatzwasser', s.cl_zw],
    ['Soll-LF (µS/cm)', s.soll_lf],
    [],
    ['WASSERWERTE – UMLAUFWASSER'],
    ['IST LF (µS/cm)', s.lf_uw],
    ['°dH Umlaufwasser', s.dh_uw],
    ['Cl mg/l Umlaufwasser', s.cl_uw],
    [],
    ['EINDICKUNG'],
    ['Eindickung IST (nach LF)', fmt(r.ez_lf,2)],
    ['Eindickung nach °dH', fmt(r.ez_dh,2)],
    ['Eindickung nach Cl', fmt(r.ez_cl,2)],
    ['Eindickung SOLL', fmt(r.ez_soll,2)],
    ['% der SOLL-LF', fmt(r.pct_soll_lf*100,1)+'%'],
    [],
    ['KARBONATHÄRTE'],
    ['KH ZW scheinbar (°KH)', fmt(r.kh_zw_scheinbar,1)],
    ['KH UW real (°KH)', fmt(r.kh_uw_real,1)],
    ['KH bei SOLL-LF (°KH)', fmt(r.kh_bei_soll_lf,1)],
    [],
    ['PRODUKTVERBRAUCH (rechnerisch)'],
    ['Prod. ml/m³ Nachspeisung', fmt(r.prod_ml_m3_ns,0)],
    ['Prod. ml/m³ Umlauf IST', fmt(r.prod_ml_m3_ul,0)],
    ['Prod. ml/m³ Umlauf bei SOLL-LF', fmt(r.prod_ml_m3_ul_soll,0)],
    ['Verbrauch rechnerisch (L)', fmt(r.prod_verbrauch_l,2)],
    [],
    ['PRODUKTVERBRAUCH (nach Eintragung)'],
    ['ml/m³ Nachspeisung', fmt(r.prod_ns_eintrag,0)],
    ['ml/m³ Umlauf SOLL', fmt(r.prod_ul_eintrag_soll,0)],
    [],
    ['BIOZIDDOSIERUNG'],
    ['Datum letztes BTB', s.datum_btb],
    ['Tage seit letztem BTB', r.tage_seit_btb],
    ['Systemvolumen (m³)', s.sys_vol],
    ['Dosiermenge pro Min (ml)', s.dos_min_ml],
    ['Dosierung Minuten', s.dos_dauer],
    ['Dosierungen pro Woche', s.dos_freq],
    ['Soll ml/m³', s.dos_soll_ml],
    ['ml/m³ Systemvolumen', fmt(r.bio_ml_m3,0)],
    ['Dos. pro Dosierung IST (L)', fmt(r.bio_dos_pro_dos_l,2)],
    ['Dos. pro Woche IST (L)', fmt(r.bio_dos_pro_woche,2)],
    ['Verbrauch seit BTB IST (L)', fmt(r.bio_seit_btb_ist,1)],
    ['Verbrauch seit BTB SOLL (L)', fmt(r.bio_seit_btb_soll,1)],
    ['Soll-Dauer pro Dosierung (min)', fmt(r.bio_dos_dauer_soll,0)],
    [],
    ['WARNUNGEN & STATUS'],
    ...r.warnings.map(w => [w.text, w.sev === 'ok' ? 'i.O.' : w.sev === 'warn' ? 'WARNUNG' : 'PROBLEM'])
  ];

  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(';')).join('\r\n');
  const bom = '\uFEFF'; // BOM für Excel-Zeichensatz
  const blob = new Blob([bom + csv], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `RKW${rkwNr}_${s.datum_neu}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// Init
render();
</script>
</body>
</html>
